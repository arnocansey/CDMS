server.port=8080
spring.application.name=cdms-backend

# PostgreSQL Configuration
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/church_db}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.max-lifetime=300000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.leak-detection-threshold=60000
spring.datasource.hikari.validation-timeout=5000

# JPA Configuration
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=false

# JWT Configuration
jwt.secret=${JWT_SECRET:Y2h1cmNoLWRtcy1zZWNyZXQta2V5LTIwMjYtZm9yLWp3dC10b2tlbi1nZW5lcmF0aW9u}
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# Application Configuration
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}
app.email.from=noreply@church.com

# Logging Configuration
logging.level.com.cdms=INFO
logging.level.org.springframework.security=WARN

# Actuator Configuration
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Paystack Configuration
paystack.secret-key=${PAYSTACK_SECRET_KEY:sk_test_placeholder}
paystack.public-key=${PAYSTACK_PUBLIC_KEY:pk_test_placeholder}
paystack.webhook-secret=${PAYSTACK_WEBHOOK_SECRET:}
paystack.callback-url=${PAYSTACK_CALLBACK_URL:http://localhost:3000/dashboard/subscription}

# Security Configuration
security.bcrypt.strength=${BCRYPT_STRENGTH:12}
