server.port=8080
spring.application.name=cdms-backend

# PostgreSQL Configuration
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/church_db}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
# idleTimeout must be less than maxLifetime (Hikari disables idleTimeout otherwise)
spring.datasource.hikari.idle-timeout=60000
spring.datasource.hikari.keepalive-time=30000
spring.datasource.hikari.max-lifetime=240000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.leak-detection-threshold=60000
spring.datasource.hikari.validation-timeout=5000

# JPA Configuration
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# Flyway Configuration
# validate-on-migrate=false avoids startup crashes when checksums drift on already-applied migrations
# (common on Neon after migration file edits). Prefer repairing checksums in controlled deploys.
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=false
spring.flyway.baseline-on-migrate=true

# JWT Configuration — override JWT_SECRET in production (Base64-encoded, >= 256 bits)
jwt.secret=${JWT_SECRET:Y2h1cmNoLWRtcy1zZWNyZXQta2V5LTIwMjYtZm9yLWp3dC10b2tlbi1nZW5lcmF0aW9u}
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# Application Configuration
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}
app.cookie.secure=${COOKIE_SECURE:false}
app.email.from=noreply@church.com

# Logging Configuration
logging.level.com.cdms=INFO
logging.level.org.springframework.security=WARN
logging.level.org.flywaydb=INFO
logging.level.org.hibernate.orm.jdbc.err=ERROR

# Actuator Configuration
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized

# Paystack Configuration
paystack.secret-key=${PAYSTACK_SECRET_KEY:}
paystack.public-key=${PAYSTACK_PUBLIC_KEY:}
paystack.webhook-secret=${PAYSTACK_WEBHOOK_SECRET:}
paystack.callback-url=${PAYSTACK_CALLBACK_URL:http://localhost:3000/dashboard/subscription}

# Security Configuration
security.bcrypt.strength=${BCRYPT_STRENGTH:12}
