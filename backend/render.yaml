services:
  - type: web
    name: cdms-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_USERNAME
        sync: false
      - key: DATABASE_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: PAYSTACK_PUBLIC_KEY
        sync: false
      - key: PAYSTACK_WEBHOOK_SECRET
        sync: false
      - key: PAYSTACK_CALLBACK_URL
        sync: false
      - key: BCRYPT_STRENGTH
        value: "12"
      - key: JAVA_OPTS
        value: "-Xms256m -Xmx512m"
    healthCheckPath: /actuator/health
    autoDeploy: true
